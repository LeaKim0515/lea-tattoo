<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lea Tattoo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #0a0a0a; color: #fff;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center;
}
.container { padding: 2rem; max-width: 400px; }
.spinner {
  width: 40px; height: 40px; margin: 0 auto 1.5rem;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #c9a96e; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 0.95rem; color: #999; line-height: 1.6; }
.msg { font-size: 1.1rem; color: #c9a96e; margin-bottom: 1rem; }
.error { color: #e74c3c; font-size: 0.85rem; margin-top: 1rem; }
.btn {
  display: inline-block; margin-top: 1.5rem; padding: 0.8rem 2rem;
  background: #06c755; color: #fff; border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 600; text-decoration: none; cursor: pointer;
}
.btn:active { opacity: 0.8; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <p class="status">読み込み中...</p>
  </div>
  <div id="result" class="hidden"></div>
</div>

<script src="https://static.line-sdn.net/liff/edge/2/sdk.js"></script>
<script>
(function() {
  var LIFF_ID = '2009486720-iptqzEwT';
  var API_URL = 'https://lealinebot-production.up.railway.app/api/liff-track';
  var LINE_ADD_URL = 'https://line.me/R/ti/p/@722xsnht';

  var loadingEl = document.getElementById('loading');
  var resultEl = document.getElementById('result');

  function showResult(html) {
    loadingEl.classList.add('hidden');
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = html;
  }

  function showError(msg) {
    showResult('<p class="error">' + msg + '</p>' +
      '<a href="' + LINE_ADD_URL + '" class="btn">LINEで相談する</a>');
  }

  // URL params から UTM 取得
  function getUtmParams() {
    var params = {};
    try {
      // LIFF の場合 liff.getContext() 経由でも取れるが、URLSearchParams が確実
      var search = '';
      // LIFF はクエリを liff.state に入れることがある
      if (window.location.search) {
        search = window.location.search;
      } else if (window.location.hash && window.location.hash.indexOf('?') !== -1) {
        search = window.location.hash.substring(window.location.hash.indexOf('?'));
      }
      var sp = new URLSearchParams(search);
      var keys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'fbclid'];
      for (var i = 0; i < keys.length; i++) {
        var v = sp.get(keys[i]);
        if (v) params[keys[i]] = v;
      }
    } catch(e) {}
    return params;
  }

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });
    } catch(e) {
      showError('初期化エラー: ' + (e.message || e));
      return;
    }

    // ログインしていなければログインさせる（LIFF内ブラウザでは通常不要）
    if (!liff.isLoggedIn()) {
      try {
        liff.login({ redirectUri: window.location.href });
        return;
      } catch(e) {
        showError('ログインエラー');
        return;
      }
    }

    // プロフィール取得
    var userId = null;
    var displayName = null;
    try {
      var profile = await liff.getProfile();
      userId = profile.userId;
      displayName = profile.displayName;
    } catch(e) {
      showError('プロフィール取得エラー');
      return;
    }

    // UTM パラメータ取得
    var utm = getUtmParams();

    // バックエンドに送信（fire-and-forget、失敗してもユーザー体験に影響なし）
    var payload = {
      userId: userId,
      displayName: displayName,
      utm_source: utm.utm_source || null,
      utm_medium: utm.utm_medium || null,
      utm_campaign: utm.utm_campaign || null,
      utm_content: utm.utm_content || null,
      fbclid: utm.fbclid || null
    };

    try {
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(function() {});
    } catch(e) {}

    // oaMessage で相談開始（友だち追加済みでも未追加でも同じ）
    window.location.href = 'https://line.me/R/oaMessage/@722xsnht/?' + encodeURIComponent('相談を始める');
  }

  main();
})();
</script>
</body>
</html>
