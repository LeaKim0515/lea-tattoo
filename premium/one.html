<style>

<script>
(function(){
  var SCHEDULE_DATE = '4月7日〜22日';
  var SCHEDULE_MONTH = SCHEDULE_DATE.match(/(\d+月)/)[1];
  var SCHEDULE_CITY = '大阪';

  // UTM params
  var rawSearch = window.location.search;
  if(rawSearch.indexOf('%3F') !== -1 || rawSearch.indexOf('%3f') !== -1){
    rawSearch = rawSearch.replace(/%3F/gi, '&');
  }
  var urlParams = new URLSearchParams(rawSearch);
  var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
  var utmData = {};
  utmKeys.forEach(function(k){ var v = urlParams.get(k); if(v) utmData[k] = v; });

  var fbclid = urlParams.get('fbclid');

  // A9: Deferred Deep Link
  try {
    if (fbclid) {
      localStorage.setItem('lea_fbclid', fbclid);
      localStorage.setItem('lea_fbclid_ts', String(Date.now()));
    } else {
      var storedFbclid = localStorage.getItem('lea_fbclid');
      var storedTs = localStorage.getItem('lea_fbclid_ts');
      if (storedFbclid && storedTs) {
        var ageMs = Date.now() - Number(storedTs);
        if (ageMs < 90 * 24 * 60 * 60 * 1000) {
          fbclid = storedFbclid;
        } else {
          localStorage.removeItem('lea_fbclid');
          localStorage.removeItem('lea_fbclid_ts');
        }
      }
    }
  } catch(e){}

  // Auto-detect Meta ad traffic
  if(!utmData.utm_source){
    var ref = document.referrer.toLowerCase();
    var isMeta = fbclid || ref.indexOf('facebook.com') !== -1 || ref.indexOf('instagram.com') !== -1 || ref.indexOf('fb.com') !== -1 || ref.indexOf('lm.facebook.com') !== -1;
    if(isMeta){
      utmData.utm_source = 'meta';
      utmData.utm_medium = 'paid';
      utmData.utm_campaign = utmData.utm_campaign || 'auto_detected';
    }
  }

  // GA4 source
  if(typeof gtag === 'function'){
    var ga4Config = {};
    if(utmData.utm_source){
      ga4Config.campaign = {
        source: utmData.utm_source,
        medium: utmData.utm_medium || '(none)',
        name: utmData.utm_campaign || '(not set)'
      };
    }
    gtag('config', 'G-QZSP3DHNW6', ga4Config);
  }

  // Ad visit storage
  if (utmData.utm_source) {
    try {
      localStorage.setItem('lea_ad_visit', JSON.stringify({
        utm_source: utmData.utm_source, utm_medium: utmData.utm_medium || null,
        utm_campaign: utmData.utm_campaign || null, utm_content: utmData.utm_content || null,
        fbclid: fbclid || null, ts: Date.now()
      }));
    } catch(e){}
  }

  // Date
  var pd = document.getElementById('priceDate');
  if(pd) pd.textContent = SCHEDULE_DATE + ' · ' + SCHEDULE_CITY;

  // LINE URL
  var baseLineUrl = 'https://lealinebot-production.up.railway.app/r';
  function buildLineUrl(source){
    var params = [];
    params.push('source=' + encodeURIComponent('one_' + source));
    utmKeys.forEach(function(k){ if(utmData[k]) params.push(k + '=' + encodeURIComponent(utmData[k])); });
    if(fbclid) params.push('fbclid=' + encodeURIComponent(fbclid));
    params.push('conversion_path=direct_lp');
    return baseLineUrl + '?' + params.join('&');
  }

  var cta = document.getElementById('lineCta');
  if(cta) cta.href = buildLineUrl('cta');

  // Pass UTM to "more" link
  var moreLink = document.getElementById('moreLink');
  if(moreLink && window.location.search){
    moreLink.href = './index.html' + window.location.search;
  }

  // LINE click events
  cta.addEventListener('click', function(){
    var landingValue = 120000;
    if(typeof fbq === 'function'){
      fbq('track', 'Lead', { content_name:'one_line_send', content_category:'tattoo', value:landingValue, currency:'JPY' });
      fbq('trackCustom', 'LeadOne', { content_name:'one_line_send', value:landingValue, currency:'JPY' });
    }
    if(typeof gtag === 'function') gtag('event', 'generate_lead', { content_name:'one_line_send', value:landingValue, currency:'JPY', send_to:'G-QZSP3DHNW6', transport_type:'beacon' });
  });

  // UTM tracker
  try {
    var u = window.location.href;
    var s = new URLSearchParams(window.location.search);
    var raw = u.indexOf('%3F') !== -1 || u.indexOf('%3f') !== -1;
    if (raw && !s.get('utm_source')) {
      var m = u.match(/[%3F?&]utm_source=([^&]*)/i);
      if (m) s = new URLSearchParams(u.split(/[%3F?]/i).pop());
    }
    if (s.get('utm_source') || s.get('utm_campaign') || raw) {
      fetch('https://lealinebot-production.up.railway.app/api/track', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: u, path: window.location.pathname,
          utm_source: s.get('utm_source'), utm_medium: s.get('utm_medium'),
          utm_campaign: s.get('utm_campaign'), utm_content: s.get('utm_content'),
          utm_term: s.get('utm_term'), referrer: document.referrer })
      }).catch(function(){});
    }
  } catch(e){}

})();
</script>
