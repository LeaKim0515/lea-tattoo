<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lea — LINE</title>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '1003353476194605');
fbq('track', 'PageView');

// Lead 이중 카운팅 방지: 메인 LP에서 이미 Lead 발생한 경우 스킵
// adVisit 미리 확인 (Pixel Lead content_name 분기용)
var _adVisitForPixel = null;
try {
  var _s = localStorage.getItem('lea_ad_visit');
  if (_s) { _adVisitForPixel = JSON.parse(_s); if (Date.now() - _adVisitForPixel.ts > 604800000) _adVisitForPixel = null; }
} catch(e){}

try {
  var alreadyLead = sessionStorage.getItem('lea_lead_fired');
  if (!alreadyLead) {
    fbq('track', 'Lead', {
      content_name: _adVisitForPixel ? 'ad_indirect_profile_line' : 'instagram_bio_line',
      value: 120000,
      currency: 'JPY'
    });
    sessionStorage.setItem('lea_lead_fired', '1');
  }
} catch(e) {
  fbq('track', 'Lead', {
    content_name: _adVisitForPixel ? 'ad_indirect_profile_line' : 'instagram_bio_line',
    value: 120000,
    currency: 'JPY'
  });
}
</script>
<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=1003353476194605&ev=PageView&noscript=1"/></noscript>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QZSP3DHNW6"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

// 광고 LP 방문 이력 확인 → GA4 캠페인 소스 동적 설정
var adVisit = null;
try {
  var stored = localStorage.getItem('lea_ad_visit');
  if (stored) {
    adVisit = JSON.parse(stored);
    // 24시간 이내만 유효
    if (Date.now() - adVisit.ts > 604800000) adVisit = null; // 7일
  }
} catch(e){}

if (adVisit) {
  // 광고 LP 방문 후 IG 프로필 경유 → 간접 전환
  gtag('config', 'G-QZSP3DHNW6', {
    campaign: {
      source: adVisit.utm_source || 'meta',
      medium: 'paid_profile',
      name: adVisit.utm_campaign || 'ad_indirect'
    }
  });
} else {
  gtag('config', 'G-QZSP3DHNW6', {
    campaign: { source: 'instagram', medium: 'organic_profile', name: 'bio_link' }
  });
}

// GA4 이중 카운팅 방지
try {
  if (!sessionStorage.getItem('lea_lead_fired_ga')) {
    gtag('event', 'generate_lead', {
      content_name: adVisit ? 'ad_indirect_profile_line' : 'instagram_bio_line',
      value: 120000,
      currency: 'JPY',
      conversion_path: adVisit ? 'ad_to_profile' : 'direct_profile',
      original_campaign: adVisit ? (adVisit.utm_campaign || '') : '',
      send_to: 'G-QZSP3DHNW6',
      transport_type: 'beacon'
    });
    sessionStorage.setItem('lea_lead_fired_ga', '1');
  }
} catch(e) {
  gtag('event', 'generate_lead', {
    content_name: adVisit ? 'ad_indirect_profile_line' : 'instagram_bio_line',
    value: 120000,
    currency: 'JPY',
    send_to: 'G-QZSP3DHNW6',
    transport_type: 'beacon'
  });
}
</script>

<script>
// Pixel + GA4 fire 후 리다이렉트 (500ms 대기로 전송 보장)
setTimeout(function(){
  var dest = 'https://lealinebot-production.up.railway.app/r';
  var params;

  if (adVisit) {
    // 광고 → LP 방문 → IG 프로필 → LINE 클릭 경로
    params = [
      'src=ad_indirect_profile',
      'utm_source=' + encodeURIComponent(adVisit.utm_source || 'meta'),
      'utm_medium=paid_profile',
      'utm_campaign=' + encodeURIComponent(adVisit.utm_campaign || 'ad_indirect'),
      'conversion_path=ad_to_profile'
    ];
    if (adVisit.utm_content) params.push('utm_content=' + encodeURIComponent(adVisit.utm_content));
    if (adVisit.fbclid) params.push('fbclid=' + encodeURIComponent(adVisit.fbclid));
    // 사용 완료 → 삭제 (중복 태깅 방지)
    try { localStorage.removeItem('lea_ad_visit'); } catch(e){}
  } else {
    // 순수 IG 프로필 경유 (광고 LP 방문 없음)
    params = [
      'src=instagram_bio',
      'utm_source=instagram',
      'utm_medium=organic_profile',
      'utm_campaign=bio_link'
    ];
  }

  window.location.replace(dest + '?' + params.join('&'));
}, 500);
</script>
</head>
<body></body>
</html>
