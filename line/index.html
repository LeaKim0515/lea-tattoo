<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lea — LINE</title>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '1003353476194605');
fbq('track', 'PageView');

// Lead 이중 카운팅 방지: 메인 LP에서 이미 Lead 발생한 경우 스킵
try {
  var alreadyLead = sessionStorage.getItem('lea_lead_fired');
  if (!alreadyLead) {
    fbq('track', 'Lead', {
      content_name: 'instagram_bio_line',
      value: 120000,
      currency: 'JPY'
    });
    sessionStorage.setItem('lea_lead_fired', '1');
  }
} catch(e) {
  // sessionStorage 불가 시 그냥 발송
  fbq('track', 'Lead', {
    content_name: 'instagram_bio_line',
    value: 120000,
    currency: 'JPY'
  });
}
</script>
<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=1003353476194605&ev=PageView&noscript=1"/></noscript>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QZSP3DHNW6"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-QZSP3DHNW6');

// GA4도 이중 카운팅 방지
try {
  if (!sessionStorage.getItem('lea_lead_fired_ga')) {
    gtag('event', 'generate_lead', {
      content_name: 'instagram_bio_line',
      value: 120000,
      currency: 'JPY',
      send_to: 'G-QZSP3DHNW6',
      transport_type: 'beacon'
    });
    sessionStorage.setItem('lea_lead_fired_ga', '1');
  }
} catch(e) {
  gtag('event', 'generate_lead', {
    content_name: 'instagram_bio_line',
    value: 120000,
    currency: 'JPY',
    send_to: 'G-QZSP3DHNW6',
    transport_type: 'beacon'
  });
}
</script>

<script>
// Pixel + GA4 fire 후 리다이렉트 (500ms 대기로 전송 보장)
setTimeout(function(){
  var dest = 'https://lealinebot-production.up.railway.app/r';
  var params = [
    'src=instagram_bio',
    'utm_source=instagram',
    'utm_medium=organic',
    'utm_campaign=bio_link'
  ];
  window.location.replace(dest + '?' + params.join('&'));
}, 500);
</script>
</head>
